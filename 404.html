<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | TRADITIONAL RECORDS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,200;1,700;1,800&display=swap" rel="stylesheet">
    <style>
        .error-page {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 5%;
        }
        .error-code {
            font-size: clamp(6rem, 20vw, 14rem);
            font-weight: 800;
            color: #1a1a1a;
            line-height: 1;
            margin: 0;
            letter-spacing: -0.05em;
        }
        .error-title {
            font-size: clamp(1.2rem, 3vw, 2rem);
            font-weight: 700;
            color: #fff;
            margin: 20px 0 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .error-desc {
            color: #666;
            font-size: 15px;
            margin-bottom: 40px;
            max-width: 400px;
        }
        .error-links {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .error-link {
            color: #fff;
            font-size: 11px;
            letter-spacing: 2px;
            text-decoration: none;
            border: 1px solid #333;
            padding: 14px 28px;
            transition: background 0.3s, border-color 0.3s;
            text-transform: uppercase;
            font-weight: 600;
        }
        .error-link:hover {
            background: var(--color-accent);
            border-color: var(--color-accent);
        }
        .error-logo {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
        }
        .error-logo img {
            height: 50px;
            width: auto;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="noise-overlay" aria-hidden="true"></div>

    <div class="error-page">
        <a href="index.html" class="error-logo"><img src="logo.png" alt="Traditional Records" width="50" height="50"></a>

        <p class="error-code">404</p>
        <h1 class="error-title">TRACK NOT FOUND</h1>
        <p class="error-desc">De pagina die je zoekt bestaat niet of is verplaatst. Misschien vind je wat je zoekt via onderstaande links.</p>

        <div class="error-links">
            <a href="index.html" class="error-link">HOME</a>
            <a href="releases.html" class="error-link">RELEASES</a>
            <a href="shop.html" class="error-link">SHOP</a>
            <a href="contact.html" class="error-link">CONTACT</a>
        </div>
    </div>
</body>
</html>
